<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Wealth - Staking Dashboard</title>
    <style>
        :root {
            --primary: #4F46E5;
            --background: #F3F4F6;
            --surface: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
        }

        .header-content h1 {
            font-size: 24px;
            margin: 0 0 8px 0;
        }

        .header-content p.subtitle {
            color: var(--text-muted);
            margin: 0;
        }

        .card {
            background-color: var(--surface);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #F9FAFB;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            font-size: 15px;
            vertical-align: middle;
        }

        .asset-name {
            font-weight: 600;
        }

        .apy {
            color: var(--success);
            font-weight: 600;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
            font-size: 14px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-secondary {
            background-color: white;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background-color: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal {
            background: var(--surface);
            padding: 32px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal h2 {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .input-wrapper span {
            padding: 0 16px;
            background: #F9FAFB;
            color: var(--text-muted);
            border-left: 1px solid var(--border);
            line-height: 44px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .helper-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <div class="header-content">
            <h1>Account Portfolio</h1>
            <p class="subtitle">Manage your assets and earn yield through staking.</p>
        </div>
        <button class="btn btn-secondary" onclick="restartDemo()">⟳ Restart Demo</button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Total</th>
                    <th>Available</th>
                    <th>Staked</th>
                    <th>Est. APY</th>
                    <th>Rewards</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="portfolioTable">
                </tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="actionModal">
    <div class="modal">
        <h2 id="modalTitle">Stake Asset</h2>
        <div class="input-group">
            <label id="modalLabel">Amount to stake</label>
            <div class="input-wrapper">
                <input type="number" id="amountInput" placeholder="0.00" min="0" step="0.01">
                <span id="assetTicker">ETH</span>
            </div>
            <div class="helper-text">
                <span id="availableAmount">Available: 0.00</span>
                <a href="#" style="color: var(--primary); text-decoration: none;" onclick="setMax(event)">Max</a>
            </div>
        </div>
        
        <div style="background: #FFFBEB; padding: 12px; border-radius: 6px; margin-bottom: 24px; font-size: 13px; color: #92400E;">
            <strong id="noticeTitle">Network Notice:</strong> <span id="noticeText">Staking takes up to 2 days to activate. Unstaking requires a 5-day unbonding period.</span>
        </div>

        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="confirmBtn" onclick="confirmAction()">Confirm</button>
        </div>
    </div>
</div>

<script>
    // Initial State Definition
    const initialState = {
        ETH: { name: 'Ethereum', ticker: 'ETH', total: 100.00, available: 68.00, staked: 32.00, apy: '3.5%', rewards: 0.45, isStakable: true },
        SOL: { name: 'Solana', ticker: 'SOL', total: 500.00, available: 500.00, staked: 0.00, apy: '6.8%', rewards: 0.00, isStakable: true },
        BTC: { name: 'Bitcoin', ticker: 'BTC', total: 2.50, available: 2.50, staked: 0.00, apy: '-', rewards: 0.00, isStakable: false }
    };

    // Deep copy for active state
    let state = JSON.parse(JSON.stringify(initialState));

    let currentAction = '';
    let currentTicker = '';

    function renderTable() {
        const tbody = document.getElementById('portfolioTable');
        tbody.innerHTML = ''; // Clear table

        for (const key in state) {
            const asset = state[key];
            const tr = document.createElement('tr');
            
            let actionsHTML = '';
            if (asset.isStakable) {
                const disableUnstake = asset.staked <= 0 ? 'disabled' : '';
                const disableStake = asset.available <= 0 ? 'disabled' : '';
                actionsHTML = `
                    <div class="actions">
                        <button class="btn btn-primary" ${disableStake} onclick="openModal('stake', '${asset.ticker}')">Stake</button>
                        <button class="btn btn-secondary" ${disableUnstake} onclick="openModal('unstake', '${asset.ticker}')">Unstake</button>
                    </div>
                `;
            } else {
                actionsHTML = `<span style="color: var(--text-muted); font-size: 13px;">Not Eligible</span>`;
            }

            tr.innerHTML = `
                <td><span class="asset-name">${asset.name} (${asset.ticker})</span></td>
                <td>${asset.total.toFixed(2)}</td>
                <td>${asset.available.toFixed(2)}</td>
                <td>${asset.staked.toFixed(2)}</td>
                <td>${asset.apy !== '-' ? `<span class="apy">${asset.apy}</span>` : '-'}</td>
                <td>${asset.rewards.toFixed(2)} ${asset.ticker}</td>
                <td>${actionsHTML}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    function openModal(action, ticker) {
        currentAction = action;
        currentTicker = ticker;
        
        const asset = state[ticker];
        const maxAmount = action === 'stake' ? asset.available : asset.staked;

        const modal = document.getElementById('actionModal');
        const title = document.getElementById('modalTitle');
        const label = document.getElementById('modalLabel');
        const tickerSpan = document.getElementById('assetTicker');
        const availableText = document.getElementById('availableAmount');
        const confirmBtn = document.getElementById('confirmBtn');
        const input = document.getElementById('amountInput');

        input.value = ''; // reset input
        tickerSpan.innerText = ticker;
        availableText.innerText = `${action === 'stake' ? 'Available to stake' : 'Available to unstake'}: ${maxAmount.toFixed(2)} ${ticker}`;

        if (action === 'stake') {
            title.innerText = `Stake ${ticker}`;
            label.innerText = 'Amount to stake';
            confirmBtn.innerText = 'Confirm Stake';
        } else {
            title.innerText = `Unstake ${ticker}`;
            label.innerText = 'Amount to unstake';
            confirmBtn.innerText = 'Confirm Unstake';
        }

        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('actionModal').style.display = 'none';
    }

    function setMax(event) {
        event.preventDefault(); // Prevent page jump
        const asset = state[currentTicker];
        const maxAmount = currentAction === 'stake' ? asset.available : asset.staked;
        document.getElementById('amountInput').value = maxAmount;
    }

    function confirmAction() {
        const inputVal = parseFloat(document.getElementById('amountInput').value);
        const asset = state[currentTicker];
        const maxAmount = currentAction === 'stake' ? asset.available : asset.staked;

        if (isNaN(inputVal) || inputVal <= 0) {
            alert('Please enter a valid amount greater than 0.');
            return;
        }

        if (inputVal > maxAmount) {
            alert('You cannot exceed your available balance.');
            return;
        }
        
        // Execute the state change
        if (currentAction === 'stake') {
            asset.available -= inputVal;
            asset.staked += inputVal;
        } else if (currentAction === 'unstake') {
            asset.staked -= inputVal;
            asset.available += inputVal;
        }

        // Re-render and close
        renderTable();
        closeModal();
    }

    function restartDemo() {
        state = JSON.parse(JSON.stringify(initialState));
        renderTable();
    }

    // Initialize table on load
    window.onload = renderTable;
</script>

</body>
</html>
