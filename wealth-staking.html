<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Management - Staking Prototype</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f7f9fc;
        }
        /* Left Panel - UI */
        .ui-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            border-right: 1px solid #e0e0e0;
        }
        /* Right Panel - API */
        .api-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
        }
        
        h2 { margin-top: 0; color: #333; }
        .api-panel h2 { color: #fff; }
        
        .card {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 24px;
        }

        .asset-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .asset-btn {
            flex: 1;
            padding: 12px;
            background: #edf2f7;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .asset-btn.active {
            background: #e6f0fd;
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .balance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .balance-item {
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        .balance-item .label { font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: bold; }
        .balance-item .value { font-size: 24px; font-weight: bold; color: #0f172a; margin-top: 8px; }

        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #475569; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .action-btns { display: flex; gap: 10px; }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            color: white;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-stake { background-color: #10b981; }
        .btn-unstake { background-color: #f43f5e; }
        
        /* API Log Styles */
        .api-log {
            background: #252526;
            border-left: 4px solid #3b82f6;
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 13px;
        }
        .api-log.post { border-left-color: #10b981; }
        .api-log.get { border-left-color: #3b82f6; }
        .api-log pre { margin: 10px 0 0 0; white-space: pre-wrap; word-wrap: break-word; color: #ce9178; }
        .endpoint { font-weight: bold; color: #dcdcaa; margin-bottom: 8px; display: block; }
        .status { color: #4ec9b0; }
        
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2>Wealth Management Staking</h2>
        
        <div class="asset-selector">
            <button class="asset-btn active" onclick="switchAsset('ETH')" id="btn-ETH">Ethereum (ETH)</button>
            <button class="asset-btn" onclick="switchAsset('SOL')" id="btn-SOL">Solana (SOL)</button>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">Your <span id="current-asset">ETH</span> Staking Position</h3>
            <div class="balance-grid">
                <div class="balance-item">
                    <div class="label">Total Staked</div>
                    <div class="value"><span id="staked-bal">32.00</span></div>
                </div>
                <div class="balance-item">
                    <div class="label">Unstaked (Liquid)</div>
                    <div class="value"><span id="liquid-bal">15.50</span></div>
                </div>
                <div class="balance-item">
                    <div class="label">Total Rewards Earned</div>
                    <div class="value" style="color:#10b981"><span id="rewards-bal">1.24</span></div>
                </div>
                <div class="balance-item">
                    <div class="label">Est. APY</div>
                    <div class="value"><span id="apy-val">3.8%</span></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">Manage Stake</h3>
            <div class="input-group">
                <label>Amount to Stake / Unstake</label>
                <input type="number" id="amount-input" placeholder="0.00" min="0" step="0.01">
            </div>
            <div class="action-btns">
                <button class="btn btn-stake" onclick="submitTransaction('STAKE')">Stake Funds</button>
                <button class="btn btn-unstake" onclick="submitTransaction('UNSTAKE')">Unstake Funds</button>
            </div>
        </div>
    </div>

    <div class="api-panel">
        <h2>Anchorage API Integration Logs</h2>
        <p style="font-size:12px; color:#888;">Live preview of API requests mapping to the UI interactions.</p>
        <div id="api-logs-container"></div>
    </div>

    <script>
        let currentAsset = 'ETH';
        
        const mockData = {
            ETH: { staked: 32.00, liquid: 15.50, rewards: 1.24, apy: "3.8%" },
            SOL: { staked: 450.00, liquid: 120.00, rewards: 18.5, apy: "6.5%" }
        };

        const walletId = "wlt_9a8b7c6d5e4f";

        // Initial Load
        window.onload = () => {
            fetchStakingBalances(currentAsset);
            fetchDailyRewards(currentAsset);
        };

        function switchAsset(asset) {
            currentAsset = asset;
            document.getElementById('btn-ETH').classList.remove('active');
            document.getElementById('btn-SOL').classList.remove('active');
            document.getElementById('btn-' + asset).classList.add('active');
            
            document.getElementById('current-asset').innerText = asset;
            document.getElementById('staked-bal').innerText = mockData[asset].staked.toFixed(2);
            document.getElementById('liquid-bal').innerText = mockData[asset].liquid.toFixed(2);
            document.getElementById('rewards-bal').innerText = mockData[asset].rewards.toFixed(2);
            document.getElementById('apy-val').innerText = mockData[asset].apy;

            logAPI('GET', `/v3/wallets/${walletId}/staking/balances?asset=${asset}`, {
                status: 200,
                data: {
                    walletId: walletId,
                    asset: asset,
                    totalStaked: mockData[asset].staked,
                    availableLiquid: mockData[asset].liquid
                }
            });

            fetchDailyRewards(asset);
        }

        function fetchStakingBalances(asset) {
            logAPI('GET', `/v3/wallets/${walletId}/staking/balances?asset=${asset}`, {
                status: 200,
                data: {
                    walletId: walletId,
                    asset: asset,
                    totalStaked: mockData[asset].staked,
                    availableLiquid: mockData[asset].liquid
                }
            });
        }

        function fetchDailyRewards(asset) {
            logAPI('GET', `/v3/wallets/${walletId}/rewards?asset=${asset}&limit=3`, {
                status: 200,
                data: {
                    asset: asset,
                    totalLifetimeRewards: mockData[asset].rewards,
                    recentDailyRewards: [
                        { date: "2026-03-29", amount: (mockData[asset].rewards * 0.05).toFixed(4) },
                        { date: "2026-03-28", amount: (mockData[asset].rewards * 0.05).toFixed(4) },
                        { date: "2026-03-27", amount: (mockData[asset].rewards * 0.05).toFixed(4) }
                    ]
                }
            });
        }

        function submitTransaction(action) {
            const amountInput = document.getElementById('amount-input').value;
            const amount = parseFloat(amountInput);

            if (!amount || amount <= 0) {
                alert("Please enter a valid amount");
                return;
            }

            if (action === 'STAKE' && amount > mockData[currentAsset].liquid) {
                alert("Insufficient liquid balance to stake.");
                return;
            }

            if (action === 'UNSTAKE' && amount > mockData[currentAsset].staked) {
                alert("Insufficient staked balance to unstake.");
                return;
            }

            // Simulate UI update
            if (action === 'STAKE') {
                mockData[currentAsset].staked += amount;
                mockData[currentAsset].liquid -= amount;
            } else {
                mockData[currentAsset].staked -= amount;
                mockData[currentAsset].liquid += amount;
            }
            
            // Re-render UI balances
            document.getElementById('staked-bal').innerText = mockData[currentAsset].staked.toFixed(2);
            document.getElementById('liquid-bal').innerText = mockData[currentAsset].liquid.toFixed(2);
            document.getElementById('amount-input').value = "";

            // Simulating Anchorage Create Transaction Payload
            const payload = {
                transactionType: action,
                assetType: currentAsset,
                amount: amount.toString(),
                sourceWalletId: walletId,
                notes: `Wealth Management User ${action} request`
            };

            const response = {
                status: 201,
                data: {
                    transactionId: "tx_" + Math.random().toString(36).substr(2, 9),
                    status: "PENDING_AUTHORIZATION",
                    createdAt: new Date().toISOString(),
                    transactionType: action,
                    assetType: currentAsset,
                    amount: amount.toString()
                }
            };

            logAPI('POST', `/v3/vaults/transactions`, payload, response);
            
            // Refetch balances to simulate polling/webhooks
            setTimeout(() => {
                fetchStakingBalances(currentAsset);
            }, 1000);
        }

        function logAPI(method, endpoint, payloadOrResponse, responseObj = null) {
            const container = document.getElementById('api-logs-container');
            const logDiv = document.createElement('div');
            logDiv.className = `api-log ${method.toLowerCase()}`;
            
            let logHTML = `<span class="endpoint">[${method}] ${endpoint}</span>`;
            
            if (method === 'POST') {
                logHTML += `<div><strong>Request Payload:</strong></div>`;
                logHTML += `<pre>${JSON.stringify(payloadOrResponse, null, 2)}</pre>`;
                logHTML += `<div style="margin-top:10px;"><strong>Response <span class="status">(${responseObj.status})</span>:</strong></div>`;
                logHTML += `<pre>${JSON.stringify(responseObj.data, null, 2)}</pre>`;
            } else {
                logHTML += `<div><strong>Response <span class="status">(${payloadOrResponse.status})</span>:</strong></div>`;
                logHTML += `<pre>${JSON.stringify(payloadOrResponse.data, null, 2)}</pre>`;
            }

            logDiv.innerHTML = logHTML;
            container.prepend(logDiv); // Add to the top
        }
    </script>
</body>
</html>
