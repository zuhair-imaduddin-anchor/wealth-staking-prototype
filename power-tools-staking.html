<template>
  <div class="staking-panel">
    <div v-if="!accounts || accounts.length === 0" class="empty-state">
      No Accounts Selected - No Preview Available
    </div>

    <div v-else class="staking-content">
      <div 
        v-for="account in accounts" 
        :key="account.id" 
        class="account-staking-card"
      >
        <div class="account-staking-header">
          <span>{{ account.name }} ({{ account.id }})</span>
        </div>
        
        <table class="mini-table">
          <thead>
            <tr>
              <th>Asset</th>
              <th>Total</th>
              <th>Staked</th>
              <th>Earned</th>
              <th>Yield</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="(asset, ticker) in getStakableAssets(account)" :key="ticker">
              <td><strong>{{ ticker }}</strong></td>
              <td>{{ asset.total.toFixed(2) }}</td>
              <td>{{ asset.staked.toFixed(2) }}</td>
              <td>{{ asset.rewards.toFixed(2) }}</td>
              <td class="text-success">{{ asset.apy }}</td>
              <td style="text-align: right;">
                <button 
                  class="btn btn-primary" 
                  :disabled="asset.available <= 0"
                  @click="openModal(account, 'stake', ticker)"
                >
                  Stake
                </button>
                <button 
                  class="btn btn-secondary" 
                  :disabled="asset.staked <= 0"
                  @click="openModal(account, 'unstake', ticker)"
                >
                  Unstake
                </button>
              </td>
            </tr>
            <tr v-if="Object.keys(getStakableAssets(account)).length === 0">
              <td colspan="6" class="text-muted text-center">No stakable assets available.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div v-if="modal.isOpen" class="modal-overlay" @click.self="closeModal">
      <div class="modal">
        <h3>{{ modal.action === 'stake' ? 'Stake' : 'Unstake' }} {{ modal.ticker }}</h3>
        <p class="modal-subtitle">Account: {{ modal.account.name }} ({{ modal.account.id }})</p>
        
        <div class="input-wrapper">
          <input 
            type="number" 
            v-model.number="modal.amount" 
            placeholder="0.00" 
            step="0.01"
          >
          <span>{{ modal.ticker }}</span>
        </div>
        
        <div class="helper-text">
          <span>Available to {{ modal.action }}: {{ maxAmount.toFixed(2) }} {{ modal.ticker }}</span>
          <a href="#" @click.prevent="setMax">Max</a>
        </div>

        <div v-if="modal.error" class="error-msg">
          {{ modal.error }}
        </div>

        <div class="modal-actions">
          <button class="btn btn-secondary" @click="closeModal">Cancel</button>
          <button class="btn btn-primary" @click="confirmAction">Confirm</button>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
export default {
  name: "StakingPanel",
  props: {
    // Passed down from SMADetails based on the left-pane selection
    accounts: {
      type: Array,
      default: () => []
    }
  },
  data() {
    return {
      modal: {
        isOpen: false,
        account: null,
        action: null, // 'stake' or 'unstake'
        ticker: null,
        amount: null,
        error: null
      }
    };
  },
  computed: {
    maxAmount() {
      if (!this.modal.account || !this.modal.ticker) return 0;
      const asset = this.modal.account.assets[this.modal.ticker];
      return this.modal.action === 'stake' ? asset.available : asset.staked;
    }
  },
  methods: {
    getStakableAssets(account) {
      // Helper to strip out non-stakable assets (like BTC) and 0 balances
      const allowed = ['ETH', 'SOL'];
      const stakable = {};
      
      if (account.assets) {
        allowed.forEach(ticker => {
          if (account.assets[ticker] && account.assets[ticker].total > 0) {
            stakable[ticker] = account.assets[ticker];
          }
        });
      }
      return stakable;
    },
    openModal(account, action, ticker) {
      this.modal = {
        isOpen: true,
        account,
        action,
        ticker,
        amount: null,
        error: null
      };
    },
    closeModal() {
      this.modal.isOpen = false;
      this.modal.error = null;
    },
    setMax() {
      this.modal.amount = this.maxAmount;
    },
    confirmAction() {
      this.modal.error = null;
      const { amount, action, ticker } = this.modal;

      if (!amount || amount <= 0) {
        this.modal.error = "Please enter a valid amount.";
        return;
      }

      if (amount > this.maxAmount) {
        this.modal.error = `Amount exceeds available balance (${this.maxAmount}).`;
        return;
      }

      // Business Logic Rules
      if (action === 'stake') {
        if (ticker === 'ETH' && amount < 32) {
          this.modal.error = "Minimum stake for Ethereum is 32 ETH.";
          return;
        }
        if (ticker === 'SOL' && amount < 2) {
          this.modal.error = "Minimum stake for Solana is 2 SOL.";
          return;
        }
      }

      // Emitting the event up to your Vuex store or API layer
      // In production, you don't mutate the prop directly. 
      // You emit an action so your backend/state manager handles it.
      this.$emit('submit-staking-action', {
        accountId: this.modal.account.id,
        action: this.modal.action,
        ticker: this.modal.ticker,
        amount: this.modal.amount
      });

      this.closeModal();
    }
  }
};
</script>
